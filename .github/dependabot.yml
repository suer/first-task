version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      timezone: "Asia/Tokyo"

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      timezone: "Asia/Tokyo"

  - package-ecosystem: "swift"
    directories:
      - "/FirstTaskDependencies"
      - "/FirstTaskTools"
    schedule:
      interval: "weekly"
      day: "friday"
      timezone: "Asia/Tokyo"
    groups:
      cross-directory:
        patterns:
          - "*"
        group-by: "dependency-name"
