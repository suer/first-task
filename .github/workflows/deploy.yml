name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup p12 certificate file
        run: |
          echo "$CERTIFICATE" > distribution.p12.txt
          base64 --decode < distribution.p12.txt > distribution.p12
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}

      - name: Setup provisioning profile
        run: |
          echo "$PROVISIONING_PROFILE" > distribution.mobileprovision.txt
          base64 --decode < distribution.mobileprovision.txt > distribution.mobileprovision
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}

      - name: Setup GoogleService-Info.plist
        run: |
          echo "$GOOGLE_SERVICE_INFO_RELEASE_PLIST" > GoogleService-Info-Release.plist.txt
          base64 --decode < GoogleService-Info-Release.plist.txt > FirstTask/Configs/GoogleService-Info-Release.plist
        env:
          GOOGLE_SERVICE_INFO_RELEASE_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_RELEASE_PLIST }}

      - name: Cache SwiftPM packages
        uses: actions/cache@v5
        with:
          path: |
            FirstTaskDependencies/.build
            FirstTaskTools/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build and deploy to DeployGate
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          DEPLOYGATE_API_KEY: ${{ secrets.DEPLOYGATE_API_KEY }}
          DEPLOYGATE_USER: ${{ secrets.DEPLOYGATE_USER }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          DEPLOYGATE_MESSAGE: ${{ github.sha }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
          FASTLANE_SKIP_UPDATE_CHECK: true
          LICENSE_PLIST_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bundle exec fastlane dg
