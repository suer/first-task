[settings]
idiomatic_version_file_enable_tools = ["ruby"]
ruby.compile=false

[tools]
swiftlint = "latest"
license-plist = "latest"
jq = "latest"

[tasks.format]
description = "Format Swift source files in-place"
run = "swift format --in-place --parallel --recursive FirstTask FirstTaskDependencies FirstTaskTests FirstTaskUITests"

[tasks.lint]
description = "Lint Swift source files with strict mode"
run = "swift format lint --strict --parallel --recursive FirstTask FirstTaskDependencies FirstTaskTests FirstTaskUITests"

[tasks.swiftlint]
description = "Run SwiftLint with strict mode"
run = "swiftlint --strict"

[tasks.license-plist]
description = "Generate OSS license list with LicensePlist"
run = "license-plist"

[tasks.bundle-install]
description = "Install Ruby dependencies"
run = "bundle install"

[tasks.build]
description = "Build the app for iOS Simulator"
depends = ["bundle-install"]
env = { FASTLANE_SKIP_UPDATE_CHECK = "true", FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT = "120" }
run = "bundle exec fastlane build_for_simulator"

[tasks.test]
description = "Run unit tests (optionally specify --destination to target a specific simulator)"
depends = ["bundle-install"]
usage = 'flag "--destination <destination>" help="Target simulator destination" default=""'
env = { FASTLANE_SKIP_UPDATE_CHECK = "true", FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT = "120" }
run = """
#!/usr/bin/env bash
dest="$usage_destination"
if [ -n "$dest" ]; then
  bundle exec fastlane scan --scheme FirstTask --destination "$dest" --skip_package_dependencies_resolution true
else
  bundle exec fastlane test
fi
"""

[tasks.download-upload-symbols]
description = "Download upload-symbols binary for Crashlytics"
run = """
#!/usr/bin/env bash
set -euo pipefail
dest="vendor/upload-symbols"
if [ -f "$dest" ]; then
  echo "upload-symbols already exists at $dest, skipping download"
  exit 0
fi
version=$(jq -r '.pins[] | select(.identity == "firebase-ios-sdk") | .state.version' FirstTaskDependencies/Package.resolved)
mkdir -p vendor
curl -fSL -o "$dest" "https://github.com/firebase/firebase-ios-sdk/raw/refs/tags/${version}/Crashlytics/upload-symbols"
chmod +x "$dest"
echo "Downloaded upload-symbols ${version} to ${dest}"
"""

[tasks.deploy]
description = "Build and distribute the app to App Distribution"
depends = ["bundle-install", "download-upload-symbols"]
env = { FASTLANE_SKIP_UPDATE_CHECK = "true", FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT = "120" }
run = "bundle exec fastlane beta"
